services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      provenance: false
    env_file:
      - backend/.env
    environment:
      - CORS_ORIGINS=https://airiq.ddns.net
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend2.0
      dockerfile: Dockerfile
      provenance: false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped