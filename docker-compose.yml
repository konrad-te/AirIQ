services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - backend/.env
    environment:
      - CORS_ORIGINS=https://airiq.ddns.net
    ports:
      - "8000:8000"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./frontend2.0/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
